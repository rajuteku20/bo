<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXA | Live Trading Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #0a0a0a;
            --accent-yellow: #f5c518;
            --card-dark: #121212;
            --text-white: #ffffff;
            --text-gray: #a1a1a1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Gold glow background */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            right: -5%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(245, 197, 24, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 22px;
            height: 22px;
            background: var(--accent-yellow);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        .nav-right {
            display: flex;
            gap: 12px;
        }

        .btn-sm-ghost {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-sm-gold {
            background: linear-gradient(180deg, #ffe44d 0%, #f5c518 100%);
            border: none;
            color: black;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            font-size: 14px;
        }

        /* Hero Area */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 5%;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            max-width: 800px;
            margin-bottom: 15px;
        }

        .highlight {
            background: var(--accent-yellow);
            color: black;
            padding: 0 10px;
            border-radius: 6px;
        }

        /* Chart Container Replacement */
        .chart-wrapper {
            width: 100%;
            max-width: 1100px;
            background: #161616;
            padding: 15px;
            border-radius: 24px;
            border: 1px solid #222;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            margin: 30px 0;
            height: 550px; /* Chart Height */
        }

        #tradingview_widget {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Floating Nav Bar */
        .floating-nav {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px;
            border-radius: 18px;
            display: flex;
            gap: 5px;
        }

        .nav-item {
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active {
            background: #222;
            color: white;
        }

        .nav-item:hover {
            color: white;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <div class="logo-icon"></div>
            toxa
        </div>
        <div class="nav-right">
            <a href="#" class="btn-sm-ghost">Sign in</a>
            <a href="#" class="btn-sm-gold">Sign up</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Trade <span class="highlight">easily</span> and conveniently</h1>
        
        <!-- Live Trading Chart Start -->
        <div class="chart-wrapper">
            <div id="tradingview_widget"></div>
        </div>
        <!-- Live Trading Chart End -->

        <div class="floating-nav">
            <div class="nav-item active">Start</div>
            <div class="nav-item">Benefits</div>
            <div class="nav-item">Payment</div>
            <div class="nav-item">Blog</div>
            <div class="nav-item">Reviews</div>
        </div>

        <h2 style="margin-top: 50px; font-size: 2.5rem; font-weight: 800;">
            You will <span class="highlight">love</span> trading with us
        </h2>
    </div>

    <!-- TradingView Widget Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
    new TradingView.widget(
    {
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "D",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "hide_side_toolbar": false,
        "allow_symbol_change": true,
        "container_id": "tradingview_widget"
    }
    );
    </script>
</body>
</html>
