<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOXA | Premium Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #0a0a0a;
            --accent-yellow: #f5c518;
            --card-gray: #161616;
            --text-white: #ffffff;
            --text-dim: #a1a1a1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Lighting glow from the image */
        body::after {
            content: "";
            position: fixed;
            top: -10%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(245, 197, 24, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: var(--accent-yellow);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); /* Simple diamond shape */
        }

        .nav-btns button {
            padding: 10px 22px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-in { background: transparent; color: white; border: 1px solid #333 !important; margin-right: 10px; }
        .btn-up { background: linear-gradient(180deg, #ffe44d 0%, #f5c518 100%); color: #000; }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 5%;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            max-width: 800px;
        }

        .hl {
            background: var(--accent-yellow);
            color: #000;
            padding: 2px 12px;
            border-radius: 8px;
        }

        .sub {
            color: var(--text-dim);
            margin: 25px 0 40px;
            max-width: 400px;
            font-size: 1.1rem;
        }

        .editor-container {
            width: 100%;
            max-width: 850px;
            background: var(--card-gray);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        textarea {
            width: 100%;
            height: 220px;
            background: #000;
            border: 1px solid #333;
            border-radius: 15px;
            color: #fff;
            padding: 20px;
            font-size: 1rem;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-save {
            background: var(--accent-yellow);
            color: #000;
            padding: 15px 45px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .tab-bar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: inline-flex;
            padding: 6px;
            border-radius: 14px;
            gap: 5px;
            margin-top: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tab {
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 13px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .tab.active { background: #222; color: white; }

        h2.footer-msg {
            margin-top: 60px;
            font-size: 2.2rem;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><div class="logo-icon"></div>toxa</div>
        <div class="nav-btns">
            <button class="btn-in">Sign in</button>
            <button class="btn-up">Sign up</button>
        </div>
    </nav>

    <div class="hero">
        <h1>Trade <span class="hl">easily</span> and conveniently</h1>
        <p class="sub">A simple and reliable platform with fast data persistence.</p>

        <div class="editor-container">
            <textarea id="dataBox" placeholder="Type anything..."></textarea>
            <div class="controls">
                <button class="btn-save" onclick="saveData()">Save</button>
                <button class="btn-in" onclick="clearData()">Clear</button>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab active">Start</div>
            <div class="tab">Benefits</div>
            <div class="tab">Payment</div>
            <div class="tab">Blog</div>
            <div class="tab">Reviews</div>
        </div>

        <h2 class="footer-msg">You will <span class="hl">love</span> trading with us</h2>
    </div>

    <script>
        window.onload = function() {
            let saved = localStorage.getItem("toxaData");
            if (saved) document.getElementById("dataBox").value = saved;
        };

        function saveData() {
            let text = document.getElementById("dataBox").value;
            localStorage.setItem("toxaData", text);
            
            const btn = document.querySelector('.btn-save');
            btn.innerText = "Saved!";
            setTimeout(() => btn.innerText = "Save", 2000);
        }

        function clearData() {
            if(confirm("Clear all data?")) {
                localStorage.removeItem("toxaData");
                document.getElementById("dataBox").value = "";
            }
        }
    </script>
</body>
</html>
